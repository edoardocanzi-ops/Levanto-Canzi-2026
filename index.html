<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Canzi | Premium Calendar</title>
    
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Hotel Canzi">
    <link rel="apple-touch-icon" href="icon-192.png">

    <script src="[https://cdn.tailwindcss.com](https://cdn.tailwindcss.com)"></script>
    <link href="[https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap](https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap)" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #000; color: #fff; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; }
        .glass-dark { background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
        .day-cell { aspect-ratio: 1 / 1; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; font-size: 0.875rem; position: relative; overflow: hidden; }
        .day-cell:hover:not(.empty) { background: rgba(255, 255, 255, 0.1); border-radius: 12px; }
        .booked { border-radius: 12px; font-weight: 600; color: #000 !important; }
        .booked-start { border-top-right-radius: 0; border-bottom-right-radius: 0; }
        .booked-end { border-top-left-radius: 0; border-bottom-left-radius: 0; }
        .booked-mid { border-radius: 0; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        .owner-mode-badge { background: linear-gradient(135deg, #d4af37 0%, #f9f295 50%, #d4af37 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: bold; }
    </style>
</head>
<body class="min-h-screen bg-black">

    <div id="app" class="max-w-4xl mx-auto px-4 py-12">
        <header class="text-center mb-16 space-y-4">
            <h1 class="text-4xl md:text-6xl font-light tracking-tight">Hotel <span class="font-medium">Canzi</span></h1>
            <p class="text-zinc-500 tracking-widest uppercase text-xs">Levanto 2026</p>
            <div id="adminBadge" class="hidden text-sm uppercase tracking-widest owner-mode-badge mt-4">Modalità Proprietario Attiva</div>
        </header>

        <div class="flex justify-center space-x-8 mb-12">
            <button onclick="changeMonth(5)" id="btn-5" class="month-btn text-zinc-500 hover:text-white transition-colors duration-300">Giugno</button>
            <button onclick="changeMonth(6)" id="btn-6" class="month-btn text-white border-b border-white pb-1 font-medium transition-colors duration-300">Luglio</button>
            <button onclick="changeMonth(7)" id="btn-7" class="month-btn text-zinc-500 hover:text-white transition-colors duration-300">Agosto</button>
        </div>

        <div class="glass p-8 mb-12 relative overflow-hidden">
            <div id="calendarHeader" class="flex justify-between items-center mb-8">
                <h2 id="monthTitle" class="text-2xl font-light italic">Luglio 2026</h2>
                <div class="flex space-x-2">
                    <div class="w-3 h-3 rounded-full bg-white"></div>
                    <span class="text-xs text-zinc-400 uppercase tracking-tighter">Occupato</span>
                </div>
            </div>

            <div class="calendar-grid mb-4">
                <div class="text-center text-zinc-600 text-[10px] uppercase font-bold">Lun</div>
                <div class="text-center text-zinc-600 text-[10px] uppercase font-bold">Mar</div>
                <div class="text-center text-zinc-600 text-[10px] uppercase font-bold">Mer</div>
                <div class="text-center text-zinc-600 text-[10px] uppercase font-bold">Gio</div>
                <div class="text-center text-zinc-600 text-[10px] uppercase font-bold">Ven</div>
                <div class="text-center text-zinc-600 text-[10px] uppercase font-bold">Sab</div>
                <div class="text-center text-zinc-600 text-[10px] uppercase font-bold">Dom</div>
            </div>

            <div id="calendarDays" class="calendar-grid"></div>
        </div>

        <div class="space-y-6">
            <div class="flex justify-between items-end">
                <h3 class="text-xl font-light">Ospiti Confermati</h3>
                <button onclick="toggleAdmin()" class="text-[10px] text-zinc-700 hover:text-zinc-400 uppercase tracking-widest transition-colors">Accesso Proprietario</button>
            </div>
            <div id="bookingsList" class="space-y-4"></div>
        </div>
    </div>

    <!-- Modale Prenotazione -->
    <div id="bookingModal" class="fixed inset-0 z-50 flex items-center justify-center hidden px-4">
        <div class="absolute inset-0 bg-black/80 backdrop-blur-sm" onclick="closeModal()"></div>
        <div class="glass-dark w-full max-w-md p-8 relative z-10">
            <h3 class="text-2xl font-light mb-6">Nuova Prenotazione</h3>
            <div class="space-y-4">
                <div>
                    <label class="block text-xs text-zinc-500 uppercase mb-2">Nome Ospite</label>
                    <input type="text" id="guestName" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 focus:outline-none focus:border-white/30 transition-all" placeholder="Esempio: Marco & Sofia">
                </div>
                <div>
                    <label class="block text-xs text-zinc-500 uppercase mb-2">Colore Etichetta</label>
                    <div class="flex space-x-3" id="colorPicker">
                        <button class="w-8 h-8 rounded-full bg-[#f8fafc] ring-2 ring-offset-2 ring-offset-black ring-white opacity-100 color-btn transition-all" data-color="#f8fafc" title="Bianco"></button>
                        <button class="w-8 h-8 rounded-full bg-[#fde047] ring-white opacity-50 hover:opacity-100 color-btn transition-all" data-color="#fde047" title="Oro"></button>
                        <button class="w-8 h-8 rounded-full bg-[#86efac] ring-white opacity-50 hover:opacity-100 color-btn transition-all" data-color="#86efac" title="Smeraldo"></button>
                        <button class="w-8 h-8 rounded-full bg-[#93c5fd] ring-white opacity-50 hover:opacity-100 color-btn transition-all" data-color="#93c5fd" title="Zaffiro"></button>
                        <button class="w-8 h-8 rounded-full bg-[#fca5a5] ring-white opacity-50 hover:opacity-100 color-btn transition-all" data-color="#fca5a5" title="Rubino"></button>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs text-zinc-500 uppercase mb-2">Dal (GG/MM/AAAA)</label>
                        <input type="text" id="startDate" placeholder="GG/MM/AAAA" maxlength="10" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 focus:outline-none text-sm tracking-wider text-center">
                    </div>
                    <div>
                        <label class="block text-xs text-zinc-500 uppercase mb-2">Al (GG/MM/AAAA)</label>
                        <input type="text" id="endDate" placeholder="GG/MM/AAAA" maxlength="10" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 focus:outline-none text-sm tracking-wider text-center">
                    </div>
                </div>
                <button onclick="saveBooking()" class="w-full bg-white text-black font-medium p-4 rounded-xl mt-4 hover:bg-zinc-200 transition-colors">Conferma Soggiorno</button>
                <button onclick="closeModal()" class="w-full bg-transparent text-zinc-500 text-sm p-2 hover:text-white transition-colors">Annulla</button>
            </div>
        </div>
    </div>

    <!-- Modale Login Admin -->
    <div id="adminModal" class="fixed inset-0 z-50 flex items-center justify-center hidden px-4">
        <div class="absolute inset-0 bg-black/80 backdrop-blur-sm" onclick="closeAdminModal()"></div>
        <div class="glass-dark w-full max-w-sm p-8 relative z-10 text-center">
            <h3 class="text-xl font-light mb-4">Codice Proprietario</h3>
            <input type="password" id="adminCodeInput" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 mb-2 text-center tracking-[0.5em] focus:outline-none focus:border-white/30" placeholder="****">
            <p id="adminError" class="text-red-500 text-xs mb-4 hidden">Codice errato</p>
            <button onclick="verifyAdminCode()" class="w-full bg-white text-black font-medium p-3 rounded-xl hover:bg-zinc-200 transition-colors">Accedi</button>
            <button onclick="closeAdminModal()" class="w-full mt-2 bg-transparent text-zinc-500 text-sm p-2 hover:text-white transition-colors">Annulla</button>
        </div>
    </div>

    <!-- Modale Messaggi / Conferma -->
    <div id="messageModal" class="fixed inset-0 z-50 flex items-center justify-center hidden px-4">
        <div class="absolute inset-0 bg-black/80 backdrop-blur-sm" onclick="closeMessageModal()"></div>
        <div class="glass-dark w-full max-w-sm p-8 relative z-10 text-center">
            <h3 id="messageTitle" class="text-xl font-light mb-4">Avviso</h3>
            <p id="messageText" class="text-zinc-400 text-sm mb-6"></p>
            <button id="messageConfirmBtn" class="w-full bg-white text-black font-medium p-3 rounded-xl hover:bg-zinc-200 transition-colors">OK</button>
            <button id="messageCancelBtn" class="w-full mt-2 bg-transparent text-zinc-500 text-sm p-2 hover:text-white transition-colors hidden">Annulla</button>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
    });
}

init();
